x-api: &api
  image: rinha-2026-php:latest
  environment:
    - DATA_DIR=/data
  networks: [rinha]
  volumes:
    - sock:/run/sock
  ulimits:
    nofile: { soft: 65535, hard: 65535 }
  security_opt:
    - seccomp:unconfined
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: "165M"

services:
  api1:
    <<: *api
    build: .
    environment:
      - DATA_DIR=/data
      - SOCK=/run/sock/api1.sock

  api2:
    <<: *api
    environment:
      - DATA_DIR=/data
      - SOCK=/run/sock/api2.sock

  lb:
    image: rinha-2026-php-lb:latest
    build:
      context: ./lb
    restart: always
    depends_on: [api1, api2]
    environment:
      - PORT=9999
      - UPSTREAMS=/run/sock/api1.sock,/run/sock/api2.sock
    volumes:
      - sock:/run/sock
    ports:
      - "9999:9999"
    networks: [rinha]
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20M"

networks:
  rinha:
    driver: bridge

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
