x-api: &api
  image: ghcr.io/leoralph/rinha-2026-php:v1.6.0
  environment:
    - DATA_DIR=/data
  networks: [rinha]
  volumes:
    - sock:/run/sock
  ulimits:
    nofile: { soft: 65535, hard: 65535 }
  security_opt:
    - seccomp:unconfined
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: "165M"

services:
  api1:
    <<: *api
    environment:
      - DATA_DIR=/data
      - SOCK=/run/sock/api1.sock

  api2:
    <<: *api
    environment:
      - DATA_DIR=/data
      - SOCK=/run/sock/api2.sock

  haproxy:
    image: haproxy:2.9-alpine
    restart: always
    depends_on: [api1, api2]
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    networks: [rinha]
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20M"

networks:
  rinha:
    driver: bridge

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
